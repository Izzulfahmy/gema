<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kamera Jari Ceria!</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                }
            }
        }
    </script>

    <style>
        /* Animasi Latar Belakang Ceria */
        body {
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Container Kamera dengan Efek Cermin */
        #output_canvas {
            transform: scaleX(-1); /* Efek cermin agar gerakan tidak terbalik */
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 1.5rem;
        }

        .cam-frame {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04), inset 0 0 0 8px white;
            position: relative;
        }

        /* Animasi Bouncy (Melompat) untuk Angka */
        @keyframes pop {
            0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
            60% { transform: scale(1.2) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .animate-pop {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Tombol Mainan */
        .toy-btn {
            box-shadow: 0 6px 0 rgba(0,0,0,0.2); 
            transition: all 0.1s;
        }
        .toy-btn:active {
            box-shadow: 0 0px 0 rgba(0,0,0,0.2); 
            transform: translateY(6px); 
        }

        /* Loading Spinner Animation */
        .spinner {
            border: 6px solid rgba(255, 255, 255, 0.3);
            border-top: 6px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <!-- Muat MediaPipe untuk Deteksi Tangan (AI) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header Judul -->
    <header class="text-center mb-6 mt-4 relative z-10">
        <h1 class="text-4xl sm:text-6xl font-black text-white drop-shadow-lg tracking-tight mb-2">
            🖐️ Jari Pintar!
        </h1>
        <p class="text-white/90 font-bold text-base sm:text-xl bg-white/20 backdrop-blur-sm px-6 py-2 rounded-full inline-block shadow-sm">
            Tunjukkan jarimu ke kamera!
        </p>
    </header>

    <!-- Area Utama Kamera -->
    <div class="relative w-full max-w-2xl aspect-[4/3] sm:aspect-video cam-frame bg-slate-800 rounded-3xl flex items-center justify-center z-10">
        
        <!-- Video Input (Disembunyikan, hanya diambil datanya) -->
        <video id="input_video" class="hidden" playsinline></video>
        
        <!-- Canvas Output (Tempat menggambar video + rangka tangan) -->
        <canvas id="output_canvas" class="hidden"></canvas>
        
        <!-- Pesan Awal & Tombol Mulai -->
        <div id="start-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-white/10 backdrop-blur-md rounded-3xl z-20">
            <div class="text-8xl mb-6 drop-shadow-md animate-bounce">📷</div>
            <button id="start-cam-btn" onclick="startCamera()" class="toy-btn bg-gradient-to-r from-pink-500 to-purple-500 text-white font-black text-xl sm:text-2xl px-8 py-4 rounded-2xl border-4 border-white">
                Nyalakan Kamera!
            </button>
        </div>

        <!-- Layar Loading AI -->
        <div id="loading-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-indigo-900/80 backdrop-blur-sm rounded-3xl z-20 hidden text-white">
            <div class="spinner mb-4"></div>
            <p class="font-bold text-lg animate-pulse">Memanggil Keajaiban AI... ✨</p>
        </div>

    </div>

    <!-- Papan Hasil Angka Jari -->
    <div id="result-board" class="mt-8 bg-white p-6 rounded-[2rem] shadow-xl border-4 border-white hidden flex-col items-center w-full max-w-sm z-10 transition-colors duration-300 transform">
        <p class="text-slate-400 font-bold uppercase tracking-widest text-sm mb-2">Jumlah Jarimu:</p>
        <div id="finger-number" class="text-7xl sm:text-8xl font-black text-slate-200">
            0
        </div>
        <div id="finger-text" class="mt-3 text-xl font-bold text-slate-500 text-center">
            Ayo angkat tanganmu!
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        
        const startOverlay = document.getElementById('start-overlay');
        const loadingOverlay = document.getElementById('loading-overlay');
        const resultBoard = document.getElementById('result-board');
        const fingerNumber = document.getElementById('finger-number');
        const fingerText = document.getElementById('finger-text');

        let isAiActive = false;
        let currentFingerCount = -1; // Menyimpan angka terakhir yang terdeteksi

        // Warna-warni ceria untuk setiap jumlah jari
        const colorPalette = {
            0: { bg: 'bg-white', border: 'border-slate-200', textCol: 'text-slate-300', msg: 'Ayo angkat tanganmu! 👋' },
            1: { bg: 'bg-red-50', border: 'border-red-400', textCol: 'text-red-500', msg: 'Satu! Seperti tiang ☝️' },
            2: { bg: 'bg-orange-50', border: 'border-orange-400', textCol: 'text-orange-500', msg: 'Dua! Gunting damai ✌️' },
            3: { bg: 'bg-yellow-50', border: 'border-yellow-400', textCol: 'text-yellow-500', msg: 'Tiga! Garpu kue 🤟' },
            4: { bg: 'bg-emerald-50', border: 'border-emerald-400', textCol: 'text-emerald-500', msg: 'Empat! Kaki kucing 🐾' },
            5: { bg: 'bg-blue-50', border: 'border-blue-400', textCol: 'text-blue-500', msg: 'Lima! Tos tinggi! 🖐️' }
        };

        function startCamera() {
            // Sembunyikan tombol mulai, tampilkan loading
            startOverlay.classList.add('hidden');
            loadingOverlay.classList.remove('hidden');

            // Inisialisasi MediaPipe Hands AI
            const hands = new Hands({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }});
            
            hands.setOptions({
                maxNumHands: 1, // Fokus ke 1 tangan saja agar akurat
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });
            
            hands.onResults(onHandResults);

            // Nyalakan Kamera
            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({image: videoElement});
                },
                width: 640,
                height: 480
            });
            
            cameraUtils.start().catch(err => {
                alert("Wah, kameranya tidak bisa diakses. Pastikan kamu sudah memberikan izin kamera ya!");
                startOverlay.classList.remove('hidden');
                loadingOverlay.classList.add('hidden');
            });
        }

        function onHandResults(results) {
            // Saat frame pertama berhasil diproses
            if (!isAiActive) {
                isAiActive = true;
                loadingOverlay.classList.add('hidden');
                canvasElement.classList.remove('hidden');
                resultBoard.classList.remove('hidden');
                resultBoard.classList.add('flex');
            }
            
            // Bersihkan canvas
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // Gambar ulang video asli dari kamera ke canvas
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // Jika tangan terdeteksi
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Gambar Garis Rangka Tangan (Warna Warni Ceria)
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#ffffff', lineWidth: 4});
                drawLandmarks(canvasCtx, landmarks, {color: '#f472b6', lineWidth: 2, radius: 6}); // Warna pink untuk titik

                // Hitung Jari
                let fingerCount = calculateFingers(landmarks);
                
                // Update UI jika jumlah jari berubah
                updateUI(fingerCount);

            } else {
                // Jika tangan tidak ada di layar
                updateUI(0);
            }
            canvasCtx.restore();
        }

        function calculateFingers(landmarks) {
            let count = 0;
            
            // Algoritma Pengecekan Jari Terangkat (Y-axis check)
            // Ujung jari (Tip) harus lebih tinggi (Y lebih kecil) dari sendi bawahnya (PIP/MCP)
            
            // Telunjuk (Index) - Tip: 8, PIP: 6
            if (landmarks[8].y < landmarks[6].y) count++;
            
            // Tengah (Middle) - Tip: 12, PIP: 10
            if (landmarks[12].y < landmarks[10].y) count++;
            
            // Manis (Ring) - Tip: 16, PIP: 14
            if (landmarks[16].y < landmarks[14].y) count++;
            
            // Kelingking (Pinky) - Tip: 20, PIP: 18
            if (landmarks[20].y < landmarks[18].y) count++;

            // Jempol (Thumb)
            // Diukur jaraknya memanjang keluar dari telapak
            const thumbTipDist = Math.hypot(landmarks[4].x - landmarks[17].x, landmarks[4].y - landmarks[17].y);
            const thumbMcpDist = Math.hypot(landmarks[2].x - landmarks[17].x, landmarks[2].y - landmarks[17].y);
            if (thumbTipDist > thumbMcpDist + 0.05) count++; 

            return count;
        }

        function updateUI(count) {
            // Batasi angka 0-5
            if (count < 0) count = 0;
            if (count > 5) count = 5;

            // Jika angka sama dengan sebelumnya, tidak perlu update animasi
            if (count === currentFingerCount) return;
            
            currentFingerCount = count;
            const style = colorPalette[count];

            // Update teks dan warna
            fingerNumber.innerText = count;
            fingerText.innerText = style.msg;

            // Bersihkan kelas warna sebelumnya
            resultBoard.className = `mt-8 p-6 rounded-[2rem] shadow-2xl flex flex-col items-center w-full max-w-sm z-10 transition-colors duration-300 border-4 ${style.bg} ${style.border}`;
            fingerNumber.className = `text-[6rem] sm:text-[8rem] leading-none font-black ${style.textCol} drop-shadow-sm`;
            fingerText.className = `mt-2 text-lg sm:text-xl font-bold text-center ${style.textCol}`;

            // Mainkan Animasi Bouncy dengan me-reset elemen
            fingerNumber.classList.remove('animate-pop');
            void fingerNumber.offsetWidth; // Trigger reflow untuk mereset animasi css
            fingerNumber.classList.add('animate-pop');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Deteksi Jari</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    },
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #020617; /* Slate 950 */
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
        }

        /* Container Kamera */
        #output_canvas {
            transform: scaleX(-1); /* Efek cermin */
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6); /* Slate 900 dengan transparansi */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Animasi Transisi Halus */
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading Spinner Modern */
        .spinner {
            border: 3px solid rgba(6, 182, 212, 0.2);
            border-top: 3px solid #06b6d4; /* Cyan 500 */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Pulse effect untuk counter */
        .value-changed {
            animation: pulseColor 0.3s ease-out;
        }
        @keyframes pulseColor {
            0% { color: #fff; transform: scale(1.1); }
            100% { color: #22d3ee; transform: scale(1); } /* Cyan 400 */
        }
    </style>

    <!-- Muat MediaPipe untuk Deteksi Tangan (AI) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header Minimalis -->
    <header class="w-full px-6 py-4 flex items-center justify-between border-b border-slate-800 bg-slate-950/80 backdrop-blur-md z-20">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></div>
            <h1 class="text-xl md:text-2xl font-light tracking-wide text-slate-300">
                Deteksi Jari <span class="font-bold text-cyan-400">AI</span>
            </h1>
        </div>
        <div class="text-xs font-medium text-slate-500 tracking-wider uppercase">
            Sistem Pengenalan Multi-Tangan
        </div>
    </header>

    <!-- Area Utama Lebar -->
    <main class="flex-grow flex items-center justify-center p-4 md:p-6 lg:p-8">
        
        <div class="relative w-full max-w-6xl aspect-video bg-slate-900 rounded-2xl overflow-hidden ring-1 ring-slate-800 shadow-2xl flex items-center justify-center">
            
            <!-- Video Input -->
            <video id="input_video" class="hidden" playsinline></video>
            
            <!-- Canvas Output -->
            <canvas id="output_canvas" class="hidden"></canvas>
            
            <!-- Layar Mulai -->
            <div id="start-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/80 backdrop-blur-sm z-20">
                <div class="mb-6 p-4 rounded-full bg-slate-800/50 ring-1 ring-slate-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                </div>
                <button id="start-cam-btn" onclick="startCamera()" class="px-8 py-3 bg-cyan-600 hover:bg-cyan-500 text-white text-sm md:text-base font-semibold rounded-lg transition-all duration-200 shadow-[0_0_20px_rgba(6,182,212,0.3)] hover:shadow-[0_0_30px_rgba(6,182,212,0.5)]">
                    Inisialisasi Kamera
                </button>
                <p class="mt-4 text-sm text-slate-500 font-light">Mendukung deteksi hingga 4 tangan sekaligus.</p>
            </div>

            <!-- Layar Loading AI -->
            <div id="loading-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/90 backdrop-blur-md z-20 hidden">
                <div class="spinner mb-5"></div>
                <p class="font-medium text-slate-300 tracking-wide text-sm">Memuat Model AI...</p>
            </div>

            <!-- Panel Hasil Modern (Melayang di bawah) -->
            <div id="result-board" class="absolute bottom-6 left-1/2 -translate-x-1/2 glass-panel px-6 py-3 rounded-2xl flex items-center gap-6 hidden fade-in z-10">
                <div class="flex flex-col">
                    <span class="text-[10px] uppercase tracking-widest text-slate-400 font-semibold mb-1">Status</span>
                    <span class="text-xs font-medium text-emerald-400 flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 block"></span> Aktif
                    </span>
                </div>
                <div class="w-px h-10 bg-slate-700/50"></div>
                <div class="flex items-center gap-4">
                    <span class="text-sm font-medium text-slate-300 uppercase tracking-widest">Total Jari:</span>
                    <span id="finger-number" class="text-4xl md:text-5xl font-mono font-bold text-cyan-400 w-12 text-center transition-colors">0</span>
                </div>
            </div>

        </div>

    </main>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        
        const startOverlay = document.getElementById('start-overlay');
        const loadingOverlay = document.getElementById('loading-overlay');
        const resultBoard = document.getElementById('result-board');
        const fingerNumber = document.getElementById('finger-number');

        let isAiActive = false;
        let currentFingerCount = -1;

        function startCamera() {
            startOverlay.classList.add('hidden');
            loadingOverlay.classList.remove('hidden');

            const hands = new Hands({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }});
            
            hands.setOptions({
                maxNumHands: 4, // Mendukung hingga 4 tangan sekaligus
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });
            
            hands.onResults(onHandResults);

            // Nyalakan Kamera dengan resolusi HD agar tampilan lebar jernih
            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({image: videoElement});
                },
                width: 1280,
                height: 720
            });
            
            cameraUtils.start().catch(err => {
                alert("Gagal mengakses kamera. Harap pastikan izin kamera telah diberikan.");
                startOverlay.classList.remove('hidden');
                loadingOverlay.classList.add('hidden');
            });
        }

        function onHandResults(results) {
            if (!isAiActive) {
                isAiActive = true;
                loadingOverlay.classList.add('hidden');
                canvasElement.classList.remove('hidden');
                resultBoard.classList.remove('hidden');
            }
            
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // Gambar video kamera
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            let totalFingers = 0;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                // Loop melalui semua tangan yang terdeteksi
                for (const landmarks of results.multiHandLandmarks) {
                    
                    // Gambar kerangka tangan dengan gaya modern (Sleek Cyan/Blue)
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: 'rgba(6, 182, 212, 0.6)', lineWidth: 2}); // Cyan line
                    drawLandmarks(canvasCtx, landmarks, {color: 'rgba(56, 189, 248, 0.9)', lineWidth: 1, radius: 3}); // Light blue dot
                    
                    // Tambahkan jumlah jari dari tangan ini ke total
                    totalFingers += calculateFingers(landmarks);
                }
                updateUI(totalFingers);
            } else {
                updateUI(0);
            }
            canvasCtx.restore();
        }

        function calculateFingers(landmarks) {
            let count = 0;
            
            // Jari Telunjuk, Tengah, Manis, Kelingking (Cek sumbu Y)
            if (landmarks[8].y < landmarks[6].y) count++;
            if (landmarks[12].y < landmarks[10].y) count++;
            if (landmarks[16].y < landmarks[14].y) count++;
            if (landmarks[20].y < landmarks[18].y) count++;

            // Jempol
            // Untuk memastikan deteksi jempol akurat di berbagai jarak, kita bandingkan jaraknya
            // relatif terhadap ukuran tangan itu sendiri.
            const handSize = Math.hypot(landmarks[0].x - landmarks[9].x, landmarks[0].y - landmarks[9].y);
            const thumbTipDist = Math.hypot(landmarks[4].x - landmarks[17].x, landmarks[4].y - landmarks[17].y);
            const thumbMcpDist = Math.hypot(landmarks[2].x - landmarks[17].x, landmarks[2].y - landmarks[17].y);
            
            // Jika jarak ujung jempol lebih jauh dari sendi pangkalnya (+ sedikit toleransi ukuran tangan)
            if (thumbTipDist > thumbMcpDist + (handSize * 0.1)) {
                count++;
            }

            return count;
        }

        function updateUI(count) {
            if (count === currentFingerCount) return;
            currentFingerCount = count;

            fingerNumber.innerText = count;

            // Efek berdenyut (pulse) saat angka berubah
            fingerNumber.classList.remove('value-changed');
            void fingerNumber.offsetWidth; 
            fingerNumber.classList.add('value-changed');
        }
    </script>
</body>
</html>

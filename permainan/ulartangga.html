<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ular Tangga Seru! 🐍🪜</title>
    
    <!-- Favicon Logo -->
    <link rel="icon" href="../aset/Logo.png" type="image/png">
    
    <!-- Google Fonts: Nunito -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#ecfdf5', 500: '#10b981', 600: '#059669', 900: '#064e3b' }
                    }
                }
            }
        }
    </script>

    <style>
        /* Animasi Latar Belakang Minimalis */
        .animated-bg {
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 50%, #f0fdfa 100%);
            background-size: 200% 200%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Wrapper Papan */
        .board-wrapper {
            width: 100%;
            max-width: min(calc(100vw - 110px), calc(100vh - 100px)); 
            position: relative;
            margin: auto;
        }

        /* Kotak Grid Ular Tangga */
        .board-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            position: relative;
            z-index: 10;
        }

        .cell {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            border-radius: 6px;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
        }

        .cell-number {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 0.6rem;
            opacity: 0.7;
        }

        @media (min-width: 640px) {
            .cell-number { font-size: 0.8rem; top: 4px; left: 6px; }
            .cell { border-radius: 12px; }
        }

        /* ==================================== */
        /* PION PEMAIN (KARAKTER HEWAN 3D)      */
        /* ==================================== */
        .player-token {
            position: absolute;
            width: 6vmin;
            height: 6vmin;
            max-width: 40px;
            max-height: 40px;
            /* Geser ke atas agar alas menempel di tengah kotak */
            transform: translate(-50%, -80%); 
            transition: top 0.4s ease-in-out, left 0.4s ease-in-out;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        .token-emoji {
            font-size: 4vmin;
            line-height: 1;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.4)); /* Efek Bayangan 3D */
            margin-bottom: -10%; /* Berdiri di atas alas */
        }

        @media (min-width: 640px) {
            .token-emoji { font-size: 28px; }
        }

        .token-base {
            width: 80%;
            height: 30%;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.8);
            box-shadow: 0 4px 5px rgba(0,0,0,0.5), inset 0 -2px 5px rgba(0,0,0,0.3);
            position: absolute;
            bottom: 0;
            z-index: 1;
        }

        /* Warna Alas Pion Spesifik */
        .base-0 { background: radial-gradient(ellipse at top, #60a5fa, #1e3a8a); } /* Biru */
        .base-1 { background: radial-gradient(ellipse at top, #f87171, #7f1d1d); } /* Merah */
        .base-2 { background: radial-gradient(ellipse at top, #34d399, #064e3b); } /* Hijau */
        .base-3 { background: radial-gradient(ellipse at top, #fbbf24, #78350f); } /* Kuning */

        /* Animasi Lompat Pion Hewan */
        @keyframes jump-arc {
            0% { transform: translate(-50%, -80%) scale(1); z-index: 60; }
            50% { transform: translate(-50%, -180%) scale(1.3); z-index: 60; }
            100% { transform: translate(-50%, -80%) scale(1); z-index: 60; }
        }
        .jumping {
            animation: jump-arc 0.4s ease-in-out;
            z-index: 60 !important;
        }

        /* Gaya Tombol Mainan */
        .toy-btn {
            transition: all 0.1s;
        }
        .toy-btn:active {
            transform: translateY(4px);
            border-bottom-width: 0px !important;
            margin-top: 4px;
        }
        .toy-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: translateY(4px);
            border-bottom-width: 0px !important;
            margin-top: 4px;
        }

        /* Efek Active Turn (Kartu Menyala) */
        .card-active {
            transform: scale(1.05);
            opacity: 1 !important;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        .card-inactive {
            transform: scale(0.95);
            opacity: 0.6;
        }

        /* ==================================== */
        /* STYLING DADU 3D                      */
        /* ==================================== */
        .perspective-1000 { perspective: 1000px; }
        .dice-cube {
            width: 100px; 
            height: 100px;
            position: relative;
            transform-style: preserve-3d;
        }
        .dice-face {
            position: absolute;
            width: 100%; 
            height: 100%;
            background: #ffffff;
            border: 3px solid #cbd5e1;
            border-radius: 16px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 12px;
            backface-visibility: hidden;
            justify-items: center;
            align-items: center;
        }
        .pip {
            width: 18px; 
            height: 18px;
            background: #334155;
            border-radius: 50%;
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.3);
        }
        /* Rotasi Muka Dadu */
        .face-1 { transform: translateZ(50px); }
        .face-1 .pip { grid-area: 2 / 2 / 3 / 3; background: #ef4444; width: 24px; height: 24px;}
        .face-2 { transform: rotateY(90deg) translateZ(50px); }
        .face-2 .pip:nth-child(1) { grid-area: 1 / 3 / 2 / 4; }
        .face-2 .pip:nth-child(2) { grid-area: 3 / 1 / 4 / 2; }
        .face-3 { transform: rotateX(90deg) translateZ(50px); }
        .face-3 .pip:nth-child(1) { grid-area: 1 / 3 / 2 / 4; }
        .face-3 .pip:nth-child(2) { grid-area: 2 / 2 / 3 / 3; }
        .face-3 .pip:nth-child(3) { grid-area: 3 / 1 / 4 / 2; }
        .face-4 { transform: rotateX(-90deg) translateZ(50px); }
        .face-4 .pip:nth-child(1) { grid-area: 1 / 1 / 2 / 2; }
        .face-4 .pip:nth-child(2) { grid-area: 1 / 3 / 2 / 4; }
        .face-4 .pip:nth-child(3) { grid-area: 3 / 1 / 4 / 2; }
        .face-4 .pip:nth-child(4) { grid-area: 3 / 3 / 4 / 4; }
        .face-5 { transform: rotateY(-90deg) translateZ(50px); }
        .face-5 .pip:nth-child(1) { grid-area: 1 / 1 / 2 / 2; }
        .face-5 .pip:nth-child(2) { grid-area: 1 / 3 / 2 / 4; }
        .face-5 .pip:nth-child(3) { grid-area: 2 / 2 / 3 / 3; }
        .face-5 .pip:nth-child(4) { grid-area: 3 / 1 / 4 / 2; }
        .face-5 .pip:nth-child(5) { grid-area: 3 / 3 / 4 / 4; }
        .face-6 { transform: rotateY(180deg) translateZ(50px); }
        .face-6 .pip:nth-child(1) { grid-area: 1 / 1 / 2 / 2; }
        .face-6 .pip:nth-child(2) { grid-area: 2 / 1 / 3 / 2; }
        .face-6 .pip:nth-child(3) { grid-area: 3 / 1 / 4 / 2; }
        .face-6 .pip:nth-child(4) { grid-area: 1 / 3 / 2 / 4; }
        .face-6 .pip:nth-child(5) { grid-area: 2 / 3 / 3 / 4; }
        .face-6 .pip:nth-child(6) { grid-area: 3 / 3 / 4 / 4; }

        /* Bayangan dadu di lantai */
        #dice-shadow {
            width: 80px; height: 30px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            position: absolute;
            bottom: -30px;
            filter: blur(8px);
        }
    </style>
</head>

    <script>
        // ==========================================
        // DATA ULAR & TANGGA
        // ==========================================
        const ladders = { 4: 14, 9: 31, 20: 38, 28: 84, 40: 59, 51: 67, 63: 81, 71: 91 };
        const snakes = { 17: 7, 54: 34, 62: 19, 64: 60, 87: 24, 93: 73, 95: 75, 99: 78 };

        // Palet warna pastel untuk kotak-kotak papan
        const cellColors = [
            'bg-red-50 text-red-500', 'bg-blue-50 text-blue-500', 
            'bg-emerald-50 text-emerald-500', 'bg-yellow-50 text-yellow-600', 
            'bg-purple-50 text-purple-500', 'bg-pink-50 text-pink-500'
        ];

        // State Multiplayer
        let numPlayers = 1;
        let currentPlayer = 0;
        let playerPositions = [1, 1, 1, 1];
        let isMoving = false;

        // Penamaan karakter sesuai dengan permintaan
        const playerNames = ['🐰 Kelinci', '🐐 Kambing', '🐸 Katak', '🐱 Kucing'];
        const playerColorClasses = ['text-blue-600', 'text-red-600', 'text-emerald-600', 'text-yellow-600'];
        const playerRingClasses = ['ring-blue-400', 'ring-red-400', 'ring-emerald-400', 'ring-yellow-400'];

        // Offset (Geser Sedikit) agar karakter tidak bertumpuk di kotak yang sama
        const posOffsets = [
            { dx: -2, dy: -2 }, // Kelinci: Kiri Atas
            { dx: 2, dy: -2 },  // Kambing: Kanan Atas
            { dx: -2, dy: 2 },  // Katak: Kiri Bawah
            { dx: 2, dy: 2 }    // Kucing: Kanan Bawah
        ];

        document.addEventListener('DOMContentLoaded', () => {
            buildBoard();
            drawSnakesAndLadders();
        });

        // ==========================================
        // FUNGSI MEMULAI GAME (STARTUP)
        // ==========================================
        function startGame(playersCount) {
            numPlayers = playersCount;
            currentPlayer = 0;
            playerPositions = [1, 1, 1, 1];
            isMoving = false;
            
            document.getElementById('startup-modal').classList.add('hidden');
            
            for (let i = 0; i < 4; i++) {
                const token = document.getElementById(`player-token-${i}`);
                const card = document.getElementById(`card-p${i}`);
                
                if (i < numPlayers) {
                    token.classList.remove('hidden');
                    card.classList.remove('hidden');
                    card.classList.add('flex');
                    updatePlayerPosition(i, 1);
                } else {
                    token.classList.add('hidden');
                    card.classList.add('hidden');
                    card.classList.remove('flex');
                }
            }

            updateTurnUI();
            
            document.getElementById('mini-dice-visual').innerHTML = '🎲';
            document.getElementById('btn-roll').disabled = false;

            console.log(`Mulai! Giliran ${playerNames[currentPlayer]}`);
        }

        // ==========================================
        // FUNGSI MEMBANGUN PAPAN
        // ==========================================
        function buildBoard() {
            const grid = document.getElementById('board-grid');
            grid.innerHTML = '';

            for (let row = 9; row >= 0; row--) {
                for (let col = 0; col < 10; col++) {
                    let num = (row % 2 === 0) ? (row * 10) + col + 1 : (row * 10) + (9 - col) + 1; 

                    const cell = document.createElement('div');
                    cell.className = `cell ${cellColors[num % cellColors.length]}`;
                    cell.innerHTML = `<span class="cell-number">${num}</span>`;
                    grid.appendChild(cell);
                }
            }
        }

        // ==========================================
        // FUNGSI MENGHITUNG KORDINAT (100% Responsif)
        // ==========================================
        function getCoordinates(num) {
            let row = Math.floor((num - 1) / 10);
            let col = (num - 1) % 10;
            if (row % 2 !== 0) col = 9 - col;

            let x = (col * 10) + 5; 
            let y = 95 - (row * 10);
            return { x, y };
        }

        // ==========================================
        // MENGGAMBAR ULAR DAN TANGGA REALISTIS (SVG)
        // ==========================================
        function drawSnakesAndLadders() {
            const svg = document.getElementById('svg-layer');
            let svgContent = '';

            // 1. GAMBAR TANGGA
            for (const [start, end] of Object.entries(ladders)) {
                const pos1 = getCoordinates(parseInt(start));
                const pos2 = getCoordinates(end);
                
                const dx = pos2.x - pos1.x;
                const dy = pos2.y - pos1.y;
                const length = Math.sqrt(dx*dx + dy*dy);
                const ux = dx/length;
                const uy = dy/length;
                const px = -uy;
                const py = ux;
                const w = 1.8;

                const r1x1 = pos1.x + px*w; const r1y1 = pos1.y + py*w;
                const r1x2 = pos2.x + px*w; const r1y2 = pos2.y + py*w;
                const r2x1 = pos1.x - px*w; const r2y1 = pos1.y - py*w;
                const r2x2 = pos2.x - px*w; const r2y2 = pos2.y - py*w;

                svgContent += `<line x1="${r1x1+0.4}" y1="${r1y1+0.4}" x2="${r1x2+0.4}" y2="${r1y2+0.4}" stroke="rgba(0,0,0,0.3)" stroke-width="1.2" stroke-linecap="round"/>`;
                svgContent += `<line x1="${r2x1+0.4}" y1="${r2y1+0.4}" x2="${r2x2+0.4}" y2="${r2y2+0.4}" stroke="rgba(0,0,0,0.3)" stroke-width="1.2" stroke-linecap="round"/>`;
                svgContent += `<line x1="${r1x1}" y1="${r1y1}" x2="${r1x2}" y2="${r1y2}" stroke="#78350f" stroke-width="1.4" stroke-linecap="round"/>`;
                svgContent += `<line x1="${r2x1}" y1="${r2y1}" x2="${r2x2}" y2="${r2y2}" stroke="#78350f" stroke-width="1.4" stroke-linecap="round"/>`;
                svgContent += `<line x1="${r1x1}" y1="${r1y1}" x2="${r1x2}" y2="${r1y2}" stroke="#b45309" stroke-width="0.6" stroke-linecap="round"/>`;
                svgContent += `<line x1="${r2x1}" y1="${r2y1}" x2="${r2x2}" y2="${r2y2}" stroke="#b45309" stroke-width="0.6" stroke-linecap="round"/>`;

                const rungCount = Math.floor(length / 3); 
                for(let i=1; i<=rungCount; i++) {
                    const t = i / (rungCount + 1);
                    const rx1 = r1x1 + (r1x2 - r1x1)*t;
                    const ry1 = r1y1 + (r1y2 - r1y1)*t;
                    const rx2 = r2x1 + (r2x2 - r2x1)*t;
                    const ry2 = r2y1 + (r2y2 - r2y1)*t;
                    svgContent += `<line x1="${rx1}" y1="${ry1}" x2="${rx2}" y2="${ry2}" stroke="#92400e" stroke-width="1" stroke-linecap="round"/>`;
                }
            }

            const snakeColors = [
                { body: '#ef4444', belly: '#fca5a5' },
                { body: '#10b981', belly: '#6ee7b7' },
                { body: '#3b82f6', belly: '#93c5fd' },
                { body: '#8b5cf6', belly: '#c4b5fd' },
                { body: '#f59e0b', belly: '#fcd34d' },
                { body: '#ec4899', belly: '#f9a8d4' }
            ];
            let colorIdx = 0;

            // 2. GAMBAR ULAR
            for (const [head, tail] of Object.entries(snakes)) {
                const hPos = getCoordinates(parseInt(head));
                const tPos = getCoordinates(tail);
                
                const dx = tPos.x - hPos.x;
                const dy = tPos.y - hPos.y;
                const length = Math.sqrt(dx*dx + dy*dy);
                const px = -dy/length;
                const py = dx/length;

                const curveOffset = length > 30 ? 15 : 8; 
                const cx1 = hPos.x + dx*0.3 + px*curveOffset;
                const cy1 = hPos.y + dy*0.3 + py*curveOffset;
                const cx2 = hPos.x + dx*0.7 - px*curveOffset;
                const cy2 = hPos.y + dy*0.7 - py*curveOffset;

                const pathData = `M ${hPos.x} ${hPos.y} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${tPos.x} ${tPos.y}`;
                const color = snakeColors[colorIdx % snakeColors.length];
                colorIdx++;

                svgContent += `<path d="${pathData}" stroke="rgba(0,0,0,0.3)" stroke-width="3.5" fill="none" stroke-linecap="round" transform="translate(0.5, 0.8)"/>`;
                svgContent += `<path d="${pathData}" stroke="${color.body}" stroke-width="3" fill="none" stroke-linecap="round"/>`;
                svgContent += `<path d="${pathData}" stroke="${color.belly}" stroke-width="1.5" stroke-dasharray="1.5 2.5" fill="none" stroke-linecap="round"/>`;

                const hdx = hPos.x - cx1;
                const hdy = hPos.y - cy1;
                const hAngle = Math.atan2(hdy, hdx) * 180 / Math.PI;

                svgContent += `
                    <g transform="translate(${hPos.x}, ${hPos.y}) rotate(${hAngle})">
                        <ellipse cx="-1.5" cy="0" rx="3" ry="2.2" fill="${color.body}"/>
                        <circle cx="-0.5" cy="-1.2" r="0.8" fill="white"/>
                        <circle cx="-0.2" cy="-1.2" r="0.4" fill="black"/>
                        <circle cx="-0.5" cy="1.2" r="0.8" fill="white"/>
                        <circle cx="-0.2" cy="1.2" r="0.4" fill="black"/>
                        <path d="M 1.5 0 L 3.5 -0.8 M 1.5 0 L 3.5 0.8 M 1.5 0 L 2.5 0" stroke="#e11d48" stroke-width="0.4" fill="none" stroke-linecap="round"/>
                    </g>
                `;
            }

            svg.innerHTML = svgContent;
        }

        // ==========================================
        // LOGIKA PERMAINAN HUD & TURN
        // ==========================================
        function updateTurnUI() {
            // Update Card di 4 sudut
            for (let i = 0; i < numPlayers; i++) {
                const card = document.getElementById(`card-p${i}`);
                if (card && !card.classList.contains('hidden')) {
                    if (i === currentPlayer) {
                        card.classList.add('card-active', 'ring-4', playerRingClasses[i]);
                        card.classList.remove('card-inactive');
                    } else {
                        card.classList.add('card-inactive');
                        card.classList.remove('card-active', 'ring-4', playerRingClasses[i]);
                    }
                }
            }
        }

        function updatePlayerPosition(pIndex, num) {
            const pos = getCoordinates(num);
            const playerToken = document.getElementById(`player-token-${pIndex}`);
            
            // Animasi lompat pion
            playerToken.classList.remove('jumping');
            void playerToken.offsetWidth; 
            playerToken.classList.add('jumping');

            // Posisi + Offset
            const offset = posOffsets[pIndex];
            playerToken.style.left = `calc(${pos.x}% + ${offset.dx}%)`;
            playerToken.style.top = `calc(${pos.y}% + ${offset.dy}%)`;
            
            // Update Teks Posisi di Kartu Pemain
            document.getElementById(`pos-p${pIndex}`).innerText = num;
        }

        function moveTokenStepByStep(pIndex, startPos, endPos, stepDelay, onComplete) {
            if (startPos >= endPos) {
                if (onComplete) onComplete();
                return;
            }
            let nextPos = startPos + 1;
            playerPositions[pIndex] = nextPos;
            updatePlayerPosition(pIndex, nextPos);
            
            setTimeout(() => {
                moveTokenStepByStep(pIndex, nextPos, endPos, stepDelay, onComplete);
            }, stepDelay);
        }

        // Fungsi log
        function setLog(message) {
            console.log("Game Update: ", message);
        }

        // ==========================================
        // ANIMASI DADU 3D DILEMPAR (DARI KIRI BAWAH)
        // ==========================================
        function rollDice3D() {
            if (isMoving) return;
            isMoving = true;
            
            const btn = document.getElementById('btn-roll');
            btn.disabled = true;

            // Persiapan Animasi Overlay 3D
            const overlay = document.getElementById('dice-3d-overlay');
            const wrapper = document.getElementById('dice-wrapper');
            const cube = document.getElementById('dice-cube');
            const shadow = document.getElementById('dice-shadow');
            const miniVisual = document.getElementById('mini-dice-visual');

            // Tampilkan layar overlay
            overlay.classList.remove('hidden');
            void overlay.offsetWidth; // force reflow
            overlay.classList.remove('opacity-0');
            overlay.classList.add('opacity-100');

            // Matikan transisi untuk reset posisi dengan instan
            wrapper.style.transition = 'none';
            cube.style.transition = 'none';
            shadow.style.transition = 'none';
            
            // Posisi AWAL dadu: Kiri Bawah (Dekat Kotak Nomor 1 dan Tombol Kocok)
            wrapper.style.transform = 'translate(-45vmin, 45vmin) scale(0.2)';
            cube.style.transform = 'rotateX(0deg) rotateY(0deg) rotateZ(0deg)';
            shadow.style.transform = 'scale(0.2)';
            shadow.style.opacity = '0';

            // Hasil random (1-6)
            const result = Math.floor(Math.random() * 6) + 1;
            
            // Konfigurasi Sudut Akhir
            let targetRotX = 0, targetRotY = 0;
            switch(result) {
                case 1: targetRotX = 0; targetRotY = 0; break;
                case 2: targetRotX = 0; targetRotY = -90; break;
                case 3: targetRotX = -90; targetRotY = 0; break;
                case 4: targetRotX = 90; targetRotY = 0; break;
                case 5: targetRotX = 0; targetRotY = 90; break;
                case 6: targetRotX = 180; targetRotY = 0; break;
            }

            // Putaran ekstra agar berputar kencang di udara
            let extraSpinsX = (Math.floor(Math.random() * 3) + 3) * 360; 
            let extraSpinsY = (Math.floor(Math.random() * 3) + 3) * 360; 
            let extraSpinsZ = (Math.floor(Math.random() * 2) + 1) * 360; 

            // Trigger Animasi Lempar (Bouncing Drop & Spin menuju tengah)
            setTimeout(() => {
                // Kubus dilempar (Bergerak ke tengah layar)
                wrapper.style.transition = 'transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                wrapper.style.transform = 'translate(0, 0) scale(1)';
                
                // Kubus berputar
                cube.style.transition = 'transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1)';
                cube.style.transform = `rotateX(${targetRotX + extraSpinsX}deg) rotateY(${targetRotY + extraSpinsY}deg) rotateZ(${extraSpinsZ}deg)`;
                
                // Bayangan
                shadow.style.transition = 'transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s ease-in';
                shadow.style.transform = 'scale(1)';
                shadow.style.opacity = '1';
                
                // Dadu mini berkedip saat dadu asli memutar
                let blinkInterval = setInterval(() => {
                    const rnd = Math.floor(Math.random() * 6) + 1;
                    miniVisual.innerHTML = `<span class="text-slate-400 opacity-50">${rnd}</span>`;
                }, 100);

                // Setelah putaran kubus utama selesai
                setTimeout(() => {
                    clearInterval(blinkInterval);
                    miniVisual.innerHTML = `<span class="text-brand-600">${result}</span>`;

                    // Tunggu sedikit agar mata pemain melihat hasil 3D
                    setTimeout(() => {
                        // Sembunyikan Overlay 3D Dadu
                        overlay.classList.remove('opacity-100');
                        overlay.classList.add('opacity-0');
                        setTimeout(() => overlay.classList.add('hidden'), 300);

                        // Lanjutkan pergerakan pion (Logic Move)
                        let currentPosTemp = playerPositions[currentPlayer];
                        let targetPos = currentPosTemp + result;
                        
                        if (targetPos > 100) {
                            console.log(`Dapat ${result}, butuh angka pas. Tetap di tempat.`);
                            setTimeout(nextTurn, 1500);
                            return;
                        }
                        
                        // Mulai lompatan step by step (satu per satu)
                        moveTokenStepByStep(currentPlayer, currentPosTemp, targetPos, 400, () => {
                            checkSnakesLadders(currentPlayer, targetPos);
                        });

                    }, 800); // 0.8s Jeda Pandang 

                }, 1200); // 1.2s Durasi Spin 3D

            }, 50); 
        }

        function checkSnakesLadders(pIndex, pos) {
            if (pos === 100) {
                triggerWin(pIndex);
                return;
            }

            if (ladders[pos]) {
                playerPositions[pIndex] = ladders[pos];
                updatePlayerPosition(pIndex, ladders[pos]);
                setTimeout(nextTurn, 1200);
            } else if (snakes[pos]) {
                playerPositions[pIndex] = snakes[pos];
                updatePlayerPosition(pIndex, snakes[pos]);
                setTimeout(nextTurn, 1200);
            } else {
                setTimeout(nextTurn, 500);
            }
        }

        function nextTurn() {
            if(playerPositions.includes(100)) return; 

            currentPlayer = (currentPlayer + 1) % numPlayers;
            updateTurnUI();
            
            isMoving = false;
            document.getElementById('btn-roll').disabled = false;
        }

        function triggerWin(pIndex) {
            const modalContainer = document.getElementById('confetti-container');
            const winModal = document.getElementById('win-modal');
            const titleEl = document.getElementById('win-title');
            
            titleEl.innerHTML = `${playerNames[pIndex]} MENANG!`;
            titleEl.className = `text-3xl sm:text-4xl font-black mb-2 ${playerColorClasses[pIndex]}`;
            
            document.getElementById('win-desc').innerHTML = `Luar biasa! Karakter <b>${playerNames[pIndex]}</b> berhasil mencapai garis akhir (100).`;

            modalContainer.classList.remove('hidden');
            setTimeout(() => {
                winModal.classList.remove('scale-0');
                winModal.classList.add('scale-100');
            }, 50);
        }

        function resetGame() {
            const modalContainer = document.getElementById('confetti-container');
            const winModal = document.getElementById('win-modal');
            
            winModal.classList.remove('scale-100');
            winModal.classList.add('scale-0');
            
            setTimeout(() => {
                modalContainer.classList.add('hidden');
                document.getElementById('startup-modal').classList.remove('hidden');
            }, 300);
        }

        // ==========================================
        // LOGIKA FULLSCREEN
        // ==========================================
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {});
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        document.addEventListener('fullscreenchange', () => {
            const enterIcon = document.getElementById('fs-icon-enter');
            const exitIcon = document.getElementById('fs-icon-exit');
            if (document.fullscreenElement) {
                enterIcon.classList.add('hidden'); exitIcon.classList.remove('hidden');
            } else {
                enterIcon.classList.remove('hidden'); exitIcon.classList.add('hidden');
            }
        });
    </script>
</body>
